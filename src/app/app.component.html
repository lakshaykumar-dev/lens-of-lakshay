<div class="row gy-4 justify-content-center">
  <div class="col-xl-3 col-lg-4 col-md-6" *ngFor="let image of imageList">
    <div class="gallery-item h-100">
      <img [src]="image" class="img-fluid" alt="">
      <div class="gallery-links d-flex align-items-center justify-content-center">
        <a [href]="image" title="Gallery 1" class="glightbox preview-link"><i class="bi bi-arrows-angle-expand"></i></a>
        <a [href]="image" class="details-link"><i class="bi bi-link-45deg"></i></a>
      </div>
    </div>
  </div><!-- End Gallery Item -->
</div>
